<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ job['Job Title'] }} - Job Details</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <a href="{{ url_for('recommend', page=current_page, id=result_id) }}" class="btn btn-secondary mb-4">← Back to Recommendations</a>
    <div class="card">
      <div class="card-body">
        <h2 class="card-title">{{ job['Job Title'] }}</h2>
        <h5 class="card-subtitle mb-2 text-muted">{{ job['Company'] }}</h5>
        <p><strong>Location:</strong> {{ job['location'] }}</p>
        <p><strong>Match:</strong> {{ job['match_percent'] }}%</p>
        <p><strong>Skills:</strong> {{ job['skills'] }}</p>
        <p><strong>Salary:</strong> {{ job.get('Salary Range', 'N/A') }}</p>
        <p><strong>Description:</strong> {{ job.get('Job Description', 'No description provided') }}</p>
        <!-- Add more fields if needed -->
      </div>
    </div>
  </div>
</body>
</html>
